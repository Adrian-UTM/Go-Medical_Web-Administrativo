<div class="login-card">
  <div class="login-card__header">
    <h1 class="login-card__title">Registrarse</h1>
    <p class="login-card__subtitle">Crea una cuenta en la plataforma administrativa</p>
  </div>

  <form class="login-form" [formGroup]="form" (ngSubmit)="onSubmit()" novalidate>

    <!-- Nombre Completo -->
    <div class="form-field" [class.form-field--error]="fullNameCtrl.invalid && fullNameCtrl.touched">
      <label class="form-field__label" for="register-name">Nombre completo</label>
      <div class="form-field__input-wrapper">
        <span class="form-field__icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
        </span>
        <input
          id="register-name"
          type="text"
          class="form-field__input"
          formControlName="full_name"
          placeholder="Juan Pérez"
          autocomplete="name"
          [attr.aria-invalid]="fullNameCtrl.invalid && fullNameCtrl.touched">
      </div>
      <span *ngIf="fullNameCtrl.touched && fullNameCtrl.hasError('required')" class="form-field__error">
        El nombre es requerido
      </span>
      <span *ngIf="fullNameCtrl.touched && fullNameCtrl.hasError('minlength')" class="form-field__error">
        Mínimo 3 caracteres
      </span>
    </div>

    <!-- Email -->
    <div class="form-field" [class.form-field--error]="emailCtrl.invalid && emailCtrl.touched">
      <label class="form-field__label" for="register-email">Correo electrónico</label>
      <div class="form-field__input-wrapper">
        <span class="form-field__icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
            <polyline points="22,6 12,13 2,6"/>
          </svg>
        </span>
        <input
          id="register-email"
          type="email"
          class="form-field__input"
          formControlName="email"
          placeholder="usuario@gmail.com"
          autocomplete="email"
          [attr.aria-invalid]="emailCtrl.invalid && emailCtrl.touched">
      </div>
      <span *ngIf="emailCtrl.touched && emailCtrl.hasError('required')" class="form-field__error">
        El correo es requerido
      </span>
      <span *ngIf="emailCtrl.touched && emailCtrl.hasError('email')" class="form-field__error">
        Ingresa un correo válido
      </span>
    </div>

    <!-- Password -->
    <div class="form-field" [class.form-field--error]="passwordCtrl.invalid && passwordCtrl.touched">
      <label class="form-field__label" for="register-password">Contraseña</label>
      <div class="form-field__input-wrapper">
        <span class="form-field__icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </span>
        <input
          id="register-password"
          [type]="showPassword() ? 'text' : 'password'"
          class="form-field__input"
          formControlName="password"
          placeholder="••••••••"
          autocomplete="new-password"
          [attr.aria-invalid]="passwordCtrl.invalid && passwordCtrl.touched">
        <button
          type="button"
          class="form-field__toggle"
          (click)="togglePassword()"
          [attr.aria-label]="showPassword() ? 'Ocultar contraseña' : 'Mostrar contraseña'">
          <svg *ngIf="!showPassword()" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="showPassword()" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <span *ngIf="passwordCtrl.touched && passwordCtrl.hasError('required')" class="form-field__error">
        La contraseña es requerida
      </span>
      <span *ngIf="passwordCtrl.touched && passwordCtrl.hasError('minlength')" class="form-field__error">
        Mínimo 6 caracteres
      </span>
    </div>

    <!-- Error global -->
    <div *ngIf="errorMessage()" class="login-form__error-banner" role="alert">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="12"/>
        <line x1="12" y1="16" x2="12.01" y2="16"/>
      </svg>
      {{ errorMessage() }}
    </div>

    <!-- Éxito global -->
    <div *ngIf="successMessage()" class="login-form__success-banner" role="alert" style="background-color: #e6f4ea; color: #1e8e3e; padding: 12px; border-radius: 6px; margin-bottom: 20px; display: flex; gap: 8px; align-items: center; font-size: 14px;">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
        <polyline points="22 4 12 14.01 9 11.01"></polyline>
      </svg>
      {{ successMessage() }}
    </div>

    <!-- Submit -->
    <button
      id="register-submit"
      type="submit"
      class="btn-primary btn-full"
      [class.btn-loading]="isLoading()"
      [disabled]="isLoading()">
      <span *ngIf="!isLoading()">Registrarse</span>
      <span *ngIf="isLoading()" class="btn-loading-content">
        <span class="btn-spinner"></span>
        Registrando...
      </span>
    </button>
    
    <!-- Link to login -->
    <div class="auth-links">
      <p>¿Ya tienes cuenta? <a routerLink="/login">Inicia sesión aquí</a></p>
    </div>
  </form>
</div>
